# Tmux Configuration
# Catppuccin Mocha theme + productivity bindings

# --- Core Settings ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 10000

# --- Base Index ---
set -g base-index 1
setw -g pane-base-index 1

# --- Keybindings ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Pane navigation (vim-like)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Pane splitting
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r n next-window
bind -r p previous-window

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- Status Bar ---
set -g status-position top
set -g status-bg "#1e1e2e"
set -g status-fg "#cdd6f4"

set -g status-left " #{session_name} "
set -g status-left-bg "#313244"
set -g status-left-fg "#89b4fa"

set -g status-right " %H:%M %a %b %d "
set -g status-right-bg "#313244"
set -g status-right-fg "#89b4fa"

setw -g window-status-format " #{window_index}: #{window_name} "
setw -g window-status-current-format " #{window_index}: #{window_name} "
setw -g window-status-current-bg "#89b4fa"
setw -g window-status-current-fg "#1e1e2e"

# --- Pane Borders (Catppuccin Colors) ---
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

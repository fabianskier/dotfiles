include nightfox.conf

# Default modifier
kitty_mod   cmd+shift

# Fonts
adjust_line_height  175%
bold_font           Hack Bold Nerd Font
bold_italic_font    Hack Bold Italic Nerd Font
font_family         Hack Regular Nerd Font
font_size           15.0
italic_font         Hack Italic Nerd Font

# Cursor
cursor                none
cursor_blink_interval 0
cursor_shape          block

# Mouse
mouse_hide_wait 3.0
copy_on_select  true

# Terminal bell
enable_audio_bell false

# Window layout
active_border_color     #00ff00
confirm_os_window_close 0
hide_window_decorations no
remember_window_size    no
window_border_width     2
window_padding_width    10

# Tab bar
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted

# Keyboard shortcuts
map cmd+c           copy_to_clipboard
map cmd+down        scroll_line_down
map cmd+up          scroll_line_up
map cmd+v           paste_from_clipboard
map kitty_mod+,     load_config_file
map kitty_mod+.     edit_config_file
map kitty_mod+enter launch --cwd=current
map kitty_mod+n     new_os_window_with_cwd
map kitty_mod+d     close_window
map kitty_mod+w     close_tab
map kitty_mod+plus  change_font_size all +2.0
map kitty_mod+minus change_font_size all -2.0
map kitty_mod+0     change_font_size all 0

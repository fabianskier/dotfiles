# Theme (catppuccin macchiato — installed via `make themes`)
include ~/.config/kitty/themes/macchiato.conf

# Fonts
font_family        JetBrainsMono Nerd Font
bold_font          JetBrainsMono Nerd Font Bold
italic_font        JetBrainsMono Nerd Font Italic
bold_italic_font   JetBrainsMono Nerd Font Bold Italic
font_size          13.0
adjust_line_height 150%
font_features      JetBrainsMono-Regular +liga +calt

# Colors & Transparency
background_opacity  0.8
active_border_color #a6da95
background_blur     20

# Undercurl support (for neovim diagnostics)
undercurl_style     thin-sparse

# Cursor
cursor_shape          block
cursor_blink_interval 0

# Terminal Bell
enable_audio_bell false

# Window
window_padding_width    10
window_border_width     2
hide_window_decorations yes
remember_window_size    no
confirm_os_window_close 0
scrollback_lines        2000

# Tab bar (hidden — tmux handles this)
tab_bar_style hidden

# Mouse
copy_on_select yes

# macOS — Option key as Alt (needed for tmux and nvim keybindings)
macos_option_as_alt yes

# Remote control (allows controlling kitty from scripts/tmux)
allow_remote_control yes
listen_on            unix:/tmp/kitty

# Performance
input_delay 1

# Shortcuts
map cmd+enter none

include dracula.conf

# Install Nerd Fonts via https://github.com/ronniedroid/getnf
# Fonts
font_family                 Hack Regular Nerd Font
bold_font                   Hack Bold Nerd Font
italic_font                 Hack Italic Nerd Font
bold_italic_font            Hack Bold Italic Nerd Font
font_size                   15.0
adjust_line_height          175%

# Cursor customization
cursor                      none
cursor_shape                block
cursor_blink_interval       0

# Window layout
window_padding_width        10
hide_window_decorations     yes
remember_window_size        no
map cmd+l                   next_layout

# Terminal bell
enable_audio_bell           no

# Tab bar
tab_bar_edge                bottom
tab_bar_style               separator

# Keyboard mapping
## reload kitty.conf
map ctrl+cmd+,              load_config_file
## open new split window retaining the cwd
map cmd+d                   new_window_with_cwd
## open new tab
map cmd+t                   new_tab_with_cwd
## changing font sizes
map cmd+equal               change_font_size all +2.0
map cmd+minus               change_font_size all -2.0
map cmd+0                   change_font_size all 0

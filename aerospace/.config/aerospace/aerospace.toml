# Aerospace configuration
# https://nikitabobko.github.io/AeroSpace/guide

start-at-login = true

exec-on-workspace-change = ['/bin/bash', '-c', '''
  sketchybar --trigger aerospace_workspace_change \
    FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE \
    PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE \
    FOCUSED_MONITOR_INDEX=$AEROSPACE_FOCUSED_MONITOR_INDEX
''']

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
outer.top = 44
outer.right = 8

# Sin monitor: solo workspaces 1-5 (en laptop)
# Con monitor: 1-5 en monitor externo, 6-10 en laptop
[workspace-to-monitor-force-assignment]
1 = ['^((?!built-in).)*$', 'built-in']
2 = ['^((?!built-in).)*$', 'built-in']
3 = ['^((?!built-in).)*$', 'built-in']
4 = ['^((?!built-in).)*$', 'built-in']
5 = ['^((?!built-in).)*$', 'built-in']
6 = ['built-in']
7 = ['built-in']
8 = ['built-in']
9 = ['built-in']
10 = ['built-in']

[mode.main.binding]

# Focus window (alt + hjkl)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move window (alt+shift + hjkl)
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize window (alt+ctrl + hjkl)
alt-ctrl-h = 'resize width -50'
alt-ctrl-j = 'resize height +50'
alt-ctrl-k = 'resize height -50'
alt-ctrl-l = 'resize width +50'

# Equalize windows
alt-e = 'balance-sizes'

# Fullscreen
alt-f = 'fullscreen'

# Switch layout
alt-b = 'layout tiles horizontal vertical'
alt-s = 'layout accordion horizontal vertical'

# Workspaces laptop (alt + 1-5)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'

# Workspaces monitor (alt + 6-0)
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# Move window to workspace laptop (alt+shift + 1-5)
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'

# Move window to workspace monitor (alt+shift + 6-0)
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'
